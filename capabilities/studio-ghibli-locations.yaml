naftiko: 1.0.0-alpha2
info:
  label: Studio Ghibli API — Locations
  description: >-
    Studio Ghibli API — Locations. 2 operations. Lead operation: List Locations.
    Self-contained Naftiko capability covering one Studio Ghibli business surface.
  tags:
    - Studio Ghibli
    - Anime
    - Locations
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
  - namespace: env
    keys: {}
capability:
  consumes:
    - type: http
      namespace: studio-ghibli-locations
      baseUri: https://ghibliapi.vercel.app
      description: Studio Ghibli API — Locations business capability. Self-contained, no shared references. Public API; no authentication required.
      resources:
        - name: locations
          path: /locations
          operations:
            - name: listLocations
              method: GET
              description: List Locations
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: fields
                  in: query
                  type: string
                  description: Comma-separated list of fields to include in the response.
                  required: false
                - name: limit
                  in: query
                  type: integer
                  description: Number of results to return (default 50; maximum 250).
                  required: false
        - name: locations-id
          path: /locations/{id}
          operations:
            - name: getLocation
              method: GET
              description: Get Location By Id
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: id
                  in: path
                  type: string
                  description: The UUID of the location.
                  required: true
                - name: fields
                  in: query
                  type: string
                  description: Comma-separated list of fields to include in the response.
                  required: false
  exposes:
    - type: rest
      namespace: studio-ghibli-locations-rest
      port: 8080
      description: REST adapter for Studio Ghibli API — Locations. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/locations
          name: locations
          description: REST surface for the locations collection.
          operations:
            - method: GET
              name: listLocations
              description: List Locations
              call: studio-ghibli-locations.listLocations
              with:
                fields: rest.fields
                limit: rest.limit
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/locations/{id}
          name: locations-id
          description: REST surface for a single location resource.
          operations:
            - method: GET
              name: getLocation
              description: Get Location By Id
              call: studio-ghibli-locations.getLocation
              with:
                id: rest.id
                fields: rest.fields
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: studio-ghibli-locations-mcp
      port: 9090
      transport: http
      description: MCP adapter for Studio Ghibli API — Locations. One tool per consumed operation, routed inline through this capability's consumes block.
      tools:
        - name: list-locations
          description: List Locations
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: studio-ghibli-locations.listLocations
          with:
            fields: tools.fields
            limit: tools.limit
          outputParameters:
            - type: object
              mapping: $.
        - name: get-location
          description: Get Location By Id
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: studio-ghibli-locations.getLocation
          with:
            id: tools.id
            fields: tools.fields
          outputParameters:
            - type: object
              mapping: $.
