naftiko: 1.0.0-alpha2
info:
  label: Studio Ghibli API — People
  description: >-
    Studio Ghibli API — People. 2 operations. Lead operation: List People.
    Self-contained Naftiko capability covering one Studio Ghibli business surface.
  tags:
    - Studio Ghibli
    - Anime
    - Characters
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
  - namespace: env
    keys: {}
capability:
  consumes:
    - type: http
      namespace: studio-ghibli-people
      baseUri: https://ghibliapi.vercel.app
      description: Studio Ghibli API — People business capability. Self-contained, no shared references. Public API; no authentication required.
      resources:
        - name: people
          path: /people
          operations:
            - name: listPeople
              method: GET
              description: List People
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: fields
                  in: query
                  type: string
                  description: Comma-separated list of fields to include in the response.
                  required: false
                - name: limit
                  in: query
                  type: integer
                  description: Number of results to return (default 50; maximum 250).
                  required: false
        - name: people-id
          path: /people/{id}
          operations:
            - name: getPerson
              method: GET
              description: Get Person By Id
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: id
                  in: path
                  type: string
                  description: The UUID of the person.
                  required: true
                - name: fields
                  in: query
                  type: string
                  description: Comma-separated list of fields to include in the response.
                  required: false
  exposes:
    - type: rest
      namespace: studio-ghibli-people-rest
      port: 8080
      description: REST adapter for Studio Ghibli API — People. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/people
          name: people
          description: REST surface for the people collection.
          operations:
            - method: GET
              name: listPeople
              description: List People
              call: studio-ghibli-people.listPeople
              with:
                fields: rest.fields
                limit: rest.limit
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/people/{id}
          name: people-id
          description: REST surface for a single person resource.
          operations:
            - method: GET
              name: getPerson
              description: Get Person By Id
              call: studio-ghibli-people.getPerson
              with:
                id: rest.id
                fields: rest.fields
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: studio-ghibli-people-mcp
      port: 9090
      transport: http
      description: MCP adapter for Studio Ghibli API — People. One tool per consumed operation, routed inline through this capability's consumes block.
      tools:
        - name: list-people
          description: List People
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: studio-ghibli-people.listPeople
          with:
            fields: tools.fields
            limit: tools.limit
          outputParameters:
            - type: object
              mapping: $.
        - name: get-person
          description: Get Person By Id
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: studio-ghibli-people.getPerson
          with:
            id: tools.id
            fields: tools.fields
          outputParameters:
            - type: object
              mapping: $.
