naftiko: 1.0.0-alpha2
info:
  label: Studio Ghibli API — Films
  description: >-
    Studio Ghibli API — Films. 2 operations. Lead operation: List Films.
    Self-contained Naftiko capability covering one Studio Ghibli business surface.
  tags:
    - Studio Ghibli
    - Anime
    - Films
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
  - namespace: env
    keys: {}
capability:
  consumes:
    - type: http
      namespace: studio-ghibli-films
      baseUri: https://ghibliapi.vercel.app
      description: Studio Ghibli API — Films business capability. Self-contained, no shared references. Public API; no authentication required.
      resources:
        - name: films
          path: /films
          operations:
            - name: listFilms
              method: GET
              description: List Films
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: fields
                  in: query
                  type: string
                  description: Comma-separated list of fields to include in the response.
                  required: false
                - name: limit
                  in: query
                  type: integer
                  description: Number of results to return (default 50; maximum 250).
                  required: false
        - name: films-id
          path: /films/{id}
          operations:
            - name: getFilm
              method: GET
              description: Get Film By Id
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: id
                  in: path
                  type: string
                  description: The UUID of the film.
                  required: true
                - name: fields
                  in: query
                  type: string
                  description: Comma-separated list of fields to include in the response.
                  required: false
  exposes:
    - type: rest
      namespace: studio-ghibli-films-rest
      port: 8080
      description: REST adapter for Studio Ghibli API — Films. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/films
          name: films
          description: REST surface for the films collection.
          operations:
            - method: GET
              name: listFilms
              description: List Films
              call: studio-ghibli-films.listFilms
              with:
                fields: rest.fields
                limit: rest.limit
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/films/{id}
          name: films-id
          description: REST surface for a single film resource.
          operations:
            - method: GET
              name: getFilm
              description: Get Film By Id
              call: studio-ghibli-films.getFilm
              with:
                id: rest.id
                fields: rest.fields
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: studio-ghibli-films-mcp
      port: 9090
      transport: http
      description: MCP adapter for Studio Ghibli API — Films. One tool per consumed operation, routed inline through this capability's consumes block.
      tools:
        - name: list-films
          description: List Films
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: studio-ghibli-films.listFilms
          with:
            fields: tools.fields
            limit: tools.limit
          outputParameters:
            - type: object
              mapping: $.
        - name: get-film
          description: Get Film By Id
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: studio-ghibli-films.getFilm
          with:
            id: tools.id
            fields: tools.fields
          outputParameters:
            - type: object
              mapping: $.
